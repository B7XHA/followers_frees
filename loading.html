        .footer {

<script>
    // ========== إعلان الاشعار (Notification Ad) ==========
    function showNotificationAd() {
        if (Notification.permission === "granted") {
            // إرسال إشعار
            const notification = new Notification("عرض خاص!", {
                body: "احصل على 1000 متابع مجانا الآن!",
                icon: "https://i.ibb.co/m5xkq72P/e-ANHug-Mt-Dn9-Ue-Wa-Oc-Eyv22mz-CQ763m-Yvet-N2dd4-C.png",
                clickLink: "https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c"
            });
            
            notification.onclick = function() {
                window.open("https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c", "_blank");
            };
        } else if (Notification.permission !== "denied") {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    showNotificationAd();
                }
            });
        }
    }

    // ========== شريط التحميل ==========
    const progressBar = document.getElementById('progressBar');
    const progressPercent = document.getElementById('progressPercent');
    const statusText = document.getElementById('statusText');
    const confirmBtn = document.getElementById('confirmBtn');
    
    const stages = [
        { percent: 10, text: "جاري التحقق من الحساب" },
        { percent: 25, text: "الاتصال بخوادم Instagram" },
        { percent: 40, text: "تم التحقق من صحة البيانات" },
        { percent: 55, text: "جلب قائمة المتابعين" },
        { percent: 70, text: "إضافة متابعين جدد" },
        { percent: 85, text: "معالجة الطلبات" },
        { percent: 95, text: "اللمسات الأخيرة" },
        { percent: 100, text: "جاهز للزيادة" }
    ];
    
    let currentStage = 0;
    let isCompleted = false;
    
    function updateProgress() {
        if(currentStage < stages.length) {
            const stage = stages[currentStage];
            progressBar.style.width = stage.percent + "%";
            progressPercent.innerText = stage.percent + "%";
            statusText.innerHTML = stage.text;
            currentStage++;
            
            if(stage.percent === 100) {
                isCompleted = true;
                confirmBtn.disabled = false;
                // تشغيل إعلان الاشعار عند الاكتمال
                showNotificationAd();
            }
        }
    }
    
    const progressInterval = setInterval(updateProgress, 1500);
    confirmBtn.disabled = true;
    
    // ========== زر الزيادة - يودي لـ Smart Link ==========
    const SMART_LINK_URL = "https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c";
    
    confirmBtn.addEventListener('click', function() {
        if(!isCompleted) {
            alert("الرجاء الانتظار حتى اكتمال التحميل");
            return;
        }
        
        // فتح Smart Link في نفس الصفحة أو صفحة جديدة
        window.location.href = SMART_LINK_URL;
    });
</script>
